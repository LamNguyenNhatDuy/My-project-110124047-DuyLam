<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Câu Lạc Bộ</title>
    <link rel="stylesheet" href="../css/style3.css">
</head>
<body>

    <div class="register-container">
        <h1>ĐĂNG KÝ CÂU LẠC BỘ</h1>
        <p class="subtitle">Vui lòng điền đầy đủ thông tin bên dưới</p>

        <form id="registerForm">
            <div class="form-group">
                <label>Họ và tên:</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên..." required>
            </div>

            <div class="form-group">
                <label>Mã số sinh viên:</label>
                <input type="text" id="studentId" placeholder="Nhập MSSV..." required>
            </div>

            <div class="form-group">
                <label>Chọn Câu lạc bộ:</label>
                <select id="club">
                    <option value="it">CLB Tin Học</option>
                    <option value="music">CLB Âm Nhạc</option>
                    <option value="sports">CLB Thể Thao</option>
                    <option value="volunteer">CLB Tình Nguyện</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lý do tham gia:</label>
                <textarea id="reason" rows="3" placeholder="Viết ngắn gọn lý do..."></textarea>
            </div>

            <button type="button" onclick="guiDangKy()">Gửi Đăng Ký</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        function guiDangKy() {
            const name = document.getElementById("fullname").value;
            const club = document.getElementById("club").selectedOptions[0].text;
            
            if(name === "" || document.getElementById("studentId").value === "") {
                alert("Vui lòng nhập đầy đủ thông tin!");
                return;
            }

            // Hiển thị thông báo thành công
            const msg = document.getElementById("message");
            msg.innerHTML = `Chúc mừng <b>${name}</b> đã gửi đơn vào <b>${club}</b> thành công!`;
            msg.style.display = "block";
            
            // Xóa form sau khi gửi
            document.getElementById("registerForm").reset();
        }
    </script>

</body>
</html>

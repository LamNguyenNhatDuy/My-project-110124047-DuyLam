<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Cửu Chương</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>
<body>

    <div class="container">
        <h1>Bảng Cửu Chương</h1>
        
        <div class="input-group">
            <label>Nhập số (2-9): </label>
            <input type="number" id="txtSo" min="2" max="9" value="2">
            <button onclick="inBang()">In bảng</button>
        </div>

        <table id="bangCuuChuong">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Phép tính</th>
                    <th>Kết quả</th>
                </tr>
            </thead>
            <tbody id="content">
                </tbody>
        </table>
    </div>

    <script>
        function inBang() {
            
            const so = document.getElementById("txtSo").value;
            const content = document.getElementById("content");
            
         
            content.innerHTML = "";

        
            for (let i = 1; i <= 10; i++) {
        
                let row = `
                    <tr>
                        <td>${i}</td>
                        <td>${so} x ${i}</td>
                        <td>${so * i}</td>
                    </tr>
                `;
                
                content.innerHTML += row;
            }
        }
    </script>
</body>
</html>
